<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Draft Guide</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#c9d1d9; font-family:system-ui,-apple-system,sans-serif; font-size:15px; line-height:1.5; }
.page { width:100%; padding:6px 12px; }

/* ── Header ── */
h1 { font-size:22px; text-align:center; color:#58a6ff; padding:8px 0 2px; display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; }
h1 select { background:#0d1117; color:#58a6ff; border:1px solid #21262d; font-size:20px; font-weight:bold; padding:2px 8px; border-radius:4px; cursor:pointer; }
h1 small { font-size:12px; color:#8b949e; font-weight:normal; display:block; width:100%; }
h2 { font-size:18px; color:#f0883e; padding:8px 0 4px; border-bottom:1px solid #21262d; margin-bottom:6px; }
h3 { font-size:15px; color:#79c0ff; margin:4px 0 3px; }

/* ── Top Nav ── */
.top-nav { display:flex; gap:4px; justify-content:center; flex-wrap:wrap; padding:4px 0;
    position:sticky; top:0; background:#0d1117; z-index:100; border-bottom:1px solid #21262d; align-items:center; }
.tab-btn { padding:5px 14px; font-size:13px; background:#161b22; color:#8b949e; border:1px solid #21262d;
    border-radius:4px; cursor:pointer; transition:all .15s; }
.tab-btn:hover { background:#21262d; color:#c9d1d9; }
.tab-btn.active { background:#1f6feb; color:#fff; border-color:#1f6feb; }
.edit-toggle { padding:5px 10px; font-size:12px; background:#21262d; color:#f0883e; border:1px solid #f0883e;
    border-radius:4px; cursor:pointer; margin-left:8px; }
.edit-toggle.active { background:#f0883e; color:#0d1117; }
.nav-search { display:inline-flex; align-items:center; gap:3px; margin-left:8px; }
.nav-search input { padding:4px 8px; font-size:12px; background:#161b22; color:#c9d1d9;
    border:1px solid #21262d; border-radius:4px; width:140px; }
.nav-search button { padding:4px 8px; font-size:11px; background:#21262d; color:#58a6ff;
    border:1px solid #30363d; border-radius:4px; cursor:pointer; }
.persistence-btns { display:flex; gap:3px; margin-left:8px; }
.persistence-btns button { padding:3px 8px; font-size:11px; background:#161b22; color:#8b949e;
    border:1px solid #21262d; border-radius:3px; cursor:pointer; }
.persistence-btns button:hover { background:#21262d; color:#c9d1d9; }

/* ── Management buttons (shown only in edit mode) ── */
#mgmt-btns { display:none; gap:3px; margin-left:8px; }
#mgmt-btns button { padding:3px 8px; font-size:11px; background:#21262d; color:#79c0ff;
    border:1px solid #30363d; border-radius:3px; cursor:pointer; }
#mgmt-btns button:hover { background:#30363d; color:#58a6ff; }

/* ── Data refresh menu ── */
.data-menu-btn { padding:3px 8px; font-size:11px; background:#161b22; color:#2ea043;
    border:1px solid #2ea043; border-radius:3px; cursor:pointer; position:relative; }
.data-menu-btn:hover { background:#1a3a2a; }
.data-menu { display:none; position:absolute; top:100%; right:0; background:#161b22; border:1px solid #30363d;
    border-radius:6px; padding:4px 0; min-width:220px; box-shadow:0 8px 24px rgba(0,0,0,.6); z-index:200; }
.data-menu.show { display:block; }
.data-menu button { display:block; width:100%; padding:6px 12px; font-size:12px; background:none; color:#c9d1d9;
    border:none; cursor:pointer; text-align:left; }
.data-menu button:hover { background:#21262d; }
.data-menu .dm-status { padding:4px 12px; font-size:10px; color:#8b949e; border-top:1px solid #21262d; margin-top:2px; }
.data-menu .dm-set { padding:4px 12px; display:flex; align-items:center; gap:4px; border-bottom:1px solid #21262d; margin-bottom:2px; }
.data-menu .dm-set label { font-size:10px; color:#8b949e; }
.data-menu .dm-set input { background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:2px 6px;
    font-size:11px; border-radius:3px; width:50px; text-transform:uppercase; }

/* ── Tabs ── */
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ── Loading overlay ── */
#loading-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:#0d1117;
    display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction:column; gap:12px; }
#loading-overlay .spinner { width:40px; height:40px; border:3px solid #21262d; border-top:3px solid #58a6ff;
    border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Card Tiles ── */
.card-tile { display:inline-block; position:relative; width:130px; margin:2px; cursor:pointer;
    border-radius:6px; overflow:hidden; background:#161b22; border:1px solid #21262d;
    vertical-align:top; transition:transform .15s, box-shadow .15s; }
.card-tile:hover { transform:scale(1.05); box-shadow:0 4px 16px rgba(0,0,0,.5); z-index:10; }
.card-tile.editing { border:2px solid #f0883e; }
.card-tile img { width:100%; display:block; border-radius:5px 5px 0 0; }
.card-noimg { padding:6px; font-size:10px; min-height:60px; display:flex; align-items:center;
    justify-content:center; text-align:center; }
.grade { position:absolute; top:2px; left:2px; font-size:11px; font-weight:bold; color:#fff;
    padding:2px 5px; border-radius:3px; z-index:2; text-shadow:0 1px 2px rgba(0,0,0,.9); }
.card-stats { font-size:10px; padding:3px 4px; background:#0d1117; color:#8b949e;
    text-align:center; white-space:nowrap; }
.card-comment { font-size:10px; padding:2px 4px; background:#0d1117; color:#f0883e;
    text-align:center; font-weight:bold; overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; max-height:18px; }

/* Rarity colors */
.rar-c { color:#c9d1d9; } .rar-u { color:#a8d8ea; } .rar-r { color:#f5c842; } .rar-m { color:#f5842c; }

/* ── Draft Guide sections ── */
.section-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.section-header h3 { margin:0; }
.card-row { display:flex; flex-wrap:wrap; gap:2px; }
.sub-label { font-size:12px; font-weight:600; margin:6px 0 2px 0; text-transform:uppercase; letter-spacing:0.5px; }
.sub-label:first-child { margin-top:0; }

/* Must-picks + Signals layout */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
@media(max-width:900px) { .two-col { grid-template-columns:1fr; } }
.picks-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
@media(max-width:900px) { .picks-grid { grid-template-columns:1fr; } }
.col-box { background:#161b22; border:1px solid #21262d; border-radius:6px; padding:8px; }

/* ── Edit panel ── */
#edit-panel { position:fixed; right:-500px; top:0; width:500px; height:100vh; background:#0d1117;
    border-left:1px solid #21262d; box-shadow:-4px 0 12px rgba(0,0,0,.5); z-index:500;
    overflow-y:auto; transition:right .3s; padding:12px; }
#edit-panel.open { right:0; }
#edit-panel h3 { margin-top:12px; margin-bottom:8px; }
.ep-section { margin-bottom:16px; }
.ep-section label { display:block; font-size:12px; color:#8b949e; margin-bottom:4px; font-weight:bold; text-transform:uppercase; }
.ep-section input[type="text"], .ep-section textarea, .ep-section select { width:100%; padding:6px 8px;
    background:#161b22; color:#c9d1d9; border:1px solid #21262d; border-radius:4px; font-size:12px; font-family:inherit; }
.ep-section textarea { min-height:60px; resize:vertical; }
.ep-section select { padding:4px 6px; }
.ep-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.ep-full { grid-column:1/-1; }
.ep-checkbox-group { display:flex; flex-wrap:wrap; gap:6px; }
.ep-checkbox-group label { display:flex; align-items:center; gap:4px; margin:0; font-size:12px; cursor:pointer; }
.ep-checkbox-group input { margin:0; }
#preview { display:flex; gap:6px; flex-direction:column; }
#preview > * { flex:1; min-height:80px; background:#161b22; border:1px solid #21262d; border-radius:4px; padding:6px; overflow-y:auto; font-size:11px; }
.btn-group { display:flex; gap:4px; margin-top:12px; }
.btn-group button { flex:1; padding:6px 8px; font-size:12px; border:1px solid; border-radius:4px; cursor:pointer; }
.btn-save { background:#238636; color:#fff; border-color:#3fb950; }
.btn-save:hover { background:#2ea043; }
.btn-close { background:#21262d; color:#c9d1d9; border-color:#30363d; }
.btn-close:hover { background:#30363d; }

/* Browser layout */
.browser-layout { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
@media(max-width:1200px) { .browser-layout { grid-template-columns:1fr; } }
.browser-col { background:#161b22; border:1px solid #21262d; border-radius:6px; padding:8px; }
.browser-col h3 { margin-top:0; }
.browser-sort { display:flex; gap:3px; flex-wrap:wrap; margin-bottom:6px; }
.browser-sort button { padding:4px 8px; font-size:11px; background:#0d1117; color:#8b949e; border:1px solid #21262d;
    border-radius:3px; cursor:pointer; }
.browser-sort button.active { background:#1f6feb; color:#fff; border-color:#1f6feb; }

/* Arch Grid */
.arch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; margin:8px 0; }
@media(max-width:600px) { .arch-grid { grid-template-columns:1fr; } }
.arch-card { background:#161b22; border:1px solid #21262d; border-radius:6px; padding:8px; cursor:pointer;
    transition:all .15s; }
.arch-card:hover { border-color:#58a6ff; background:#1a1f26; }
.arch-card.selected { border-color:#58a6ff; background:#1a3a2a; }
.arch-title { font-weight:bold; color:#58a6ff; margin-bottom:4px; font-size:13px; }
.arch-colors { display:flex; gap:2px; margin:4px 0; flex-wrap:wrap; }
.arch-color { width:16px; height:16px; border-radius:3px; border:1px solid #30363d; }
.arch-desc { font-size:11px; color:#8b949e; line-height:1.4; }

/* Mobile detail panel */
#mobile-detail { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.9);
    z-index:4000; display:none; overflow-y:auto; }
#mobile-detail.show { display:block; }
#mobile-detail .md-close { position:fixed; top:10px; right:10px; z-index:4001;
    background:#21262d; color:#c9d1d9; border:1px solid #30363d; border-radius:50%;
    width:36px; height:36px; font-size:18px; cursor:pointer; line-height:34px; text-align:center; }
#mobile-detail .md-header { display:flex; gap:10px; padding:12px; padding-top:50px; }
#mobile-detail .md-header img { width:140px; border-radius:8px; flex-shrink:0; }
#mobile-detail .md-info { flex:1; }
#mobile-detail .md-name { font-size:16px; font-weight:bold; color:#58a6ff; margin-bottom:4px; }
#mobile-detail .md-type { font-size:12px; color:#8b949e; margin-bottom:4px; }
#mobile-detail .md-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:3px; font-size:12px; }
#mobile-detail .md-stats .ms-label { color:#8b949e; font-size:10px; }
#mobile-detail .md-stats .ms-val { color:#f0883e; font-weight:bold; }
#mobile-detail .md-tags { display:flex; flex-wrap:wrap; gap:3px; padding:8px 12px; }
#mobile-detail .md-tags span { font-size:11px; padding:2px 8px; border-radius:10px;
    background:#21262d; color:#79c0ff; border:1px solid #30363d; }
#mobile-detail .md-comment { padding:6px 12px; font-size:12px; color:#f0883e;
    background:#161b22; margin:4px 12px; border-radius:4px; font-style:italic; }

/* Info boxes */
.info-box { background:#161b22; border:1px solid #21262d; border-radius:6px; padding:8px 10px; margin:3px 0; font-size:13px; line-height:1.5; position:relative; }
.info-box .info-title { color:#f0883e; font-weight:bold; font-size:14px; margin-bottom:3px; }
.info-columns { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:6px; }
.info-box.editable { cursor:pointer; border-color:#30363d; }
.info-box.editable:hover { border-color:#f0883e; }
.info-box .tip-edit-icon { position:absolute; top:6px; right:8px; font-size:11px; color:#484f58; display:none; }
.info-box.editable .tip-edit-icon { display:inline; }
.info-box.editable:hover .tip-edit-icon { color:#f0883e; }
.tip-edit-input { width:100%; background:#0d1117; border:1px solid #30363d; border-radius:4px; color:#c9d1d9; padding:4px 6px; font-family:inherit; font-size:13px; margin-bottom:4px; }
.tip-edit-input.title-input { font-size:14px; font-weight:bold; color:#f0883e; }
.tip-edit-textarea { width:100%; min-height:80px; background:#0d1117; border:1px solid #30363d; border-radius:4px; color:#c9d1d9; padding:6px; font-family:inherit; font-size:13px; resize:vertical; }
.tip-edit-actions { display:flex; gap:4px; margin-top:4px; justify-content:flex-end; }
.tip-edit-actions button { padding:3px 10px; border:none; border-radius:4px; font-size:11px; cursor:pointer; }
.tip-edit-actions .tip-save { background:#238636; color:#fff; }
.tip-edit-actions .tip-save:hover { background:#2ea043; }
.tip-edit-actions .tip-cancel { background:#21262d; color:#c9d1d9; }
.tip-edit-actions .tip-cancel:hover { background:#30363d; }
.tip-add-btn { background:transparent; border:2px dashed #30363d; border-radius:6px; padding:12px; color:#484f58; font-size:13px; cursor:pointer; display:none; text-align:center; }
.tip-add-btn:hover { border-color:#f0883e; color:#f0883e; }
.tip-del-btn { position:absolute; top:4px; right:24px; font-size:12px; color:#484f58; cursor:pointer; display:none; background:none; border:none; padding:2px; }
.info-box.editable .tip-del-btn { display:inline; }
.info-box.editable .tip-del-btn:hover { color:#e74c3c; }

/* Stats bar */
.stats-bar { display:flex; gap:6px; justify-content:center; padding:4px; font-size:12px; color:#8b949e; flex-wrap:wrap; }
.stats-bar span { background:#161b22; padding:2px 6px; border-radius:3px; border:1px solid #21262d; }
.stats-bar .highlight { color:#f0883e; }

/* ── Management Modals ── */
.mgmt-modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.7); z-index:500; overflow-y:auto; padding:20px; }
.mgmt-modal.show { display:flex; align-items:flex-start; justify-content:center; }
.mgmt-panel { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:16px; max-width:700px; width:100%; margin-top:40px; max-height:80vh; overflow-y:auto; }
.mgmt-panel h3 { color:#58a6ff; margin-bottom:12px; }
.mgmt-item { background:#0d1117; border:1px solid #21262d; border-radius:6px; padding:10px; margin-bottom:8px; }
.mgmt-item .mi-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.mgmt-item .mi-name { font-weight:bold; color:#c9d1d9; }
.mgmt-item .mi-actions button { padding:2px 8px; font-size:11px; margin-left:4px; background:#21262d; color:#8b949e; border:1px solid #30363d; border-radius:3px; cursor:pointer; }
.mgmt-item .mi-actions .mi-delete { color:#f85149; border-color:#f85149; }
.mgmt-field { margin:4px 0; }
.mgmt-field label { font-size:11px; color:#8b949e; display:block; margin-bottom:2px; }
.mgmt-field input, .mgmt-field textarea { width:100%; padding:4px 8px; font-size:12px; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:4px; }
.mgmt-field textarea { min-height:40px; resize:vertical; }
.mgmt-add-btn { padding:6px 12px; font-size:12px; background:#238636; color:#fff; border:none; border-radius:4px; cursor:pointer; margin-top:8px; }
.mgmt-save-btn { padding:6px 16px; font-size:13px; background:#1f6feb; color:#fff; border:none; border-radius:6px; cursor:pointer; margin-top:12px; }
.mgmt-close { position:absolute; top:12px; right:16px; background:none; border:none; color:#8b949e; font-size:20px; cursor:pointer; }

/* ── Mobile Responsive ── */
@media(max-width:600px) {
    .page { padding:4px 6px; }
    h1 { font-size:16px; } h2 { font-size:15px; } h3 { font-size:13px; }
    .top-nav { gap:2px; padding:3px 0; }
    .tab-btn { font-size:11px; padding:3px 8px; }
    .nav-search input { width:90px !important; font-size:10px !important; }
    .card-tile { width:90px !important; margin:1px !important; }
    .card-stats { font-size:9px !important; padding:2px 3px !important; }
    .grade { font-size:9px !important; padding:1px 3px !important; }
    .arch-grid { grid-template-columns:1fr !important; }
    .two-col { grid-template-columns:1fr !important; }
    .picks-grid { grid-template-columns:1fr !important; }
    .info-columns { grid-template-columns:1fr !important; }
    .persistence-btns { display:none; }
    #edit-panel { width:100vw !important; right:-100vw !important; }
    #edit-panel.open { right:0 !important; }
    #preview { display:none !important; }
}
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
    <div class="spinner"></div>
    <div style="color:#8b949e;font-size:14px;">Loading card data...</div>
</div>

<div class="page">
<h1>
    <select id="set-selector" onchange="switchSet(this.value)" style="background:#0d1117;color:#58a6ff;border:1px solid #21262d;font-size:20px;font-weight:bold;padding:2px 8px;border-radius:4px;cursor:pointer;">
    </select>
    Draft Guide
    <small>17Lands Win Rates · Editable Card Positions</small>
</h1>

<div class="top-nav">
    <button class="tab-btn active" onclick="switchTab('guide')">Draft Guide</button>
    <button class="tab-btn" onclick="switchTab('browser')">Card Browser</button>
    <button class="edit-toggle" id="edit-mode-btn" onclick="toggleEditMode()">Edit Mode</button>
    <div class="nav-search">
        <input type="text" id="card-search" placeholder="Search card...">
        <button onclick="searchNext()">Next</button>
        <span id="search-count" style="font-size:10px;color:#8b949e;min-width:30px;"></span>
    </div>
    <div class="persistence-btns">
        <button onclick="exportConfig()">Export</button>
        <button onclick="document.getElementById('import-file').click()">Import</button>
        <button onclick="resetConfig()">Reset</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importConfig(event)">
        <div style="position:relative;display:inline-block;">
            <button class="data-menu-btn" onclick="toggleDataMenu(event)">⟳ Data</button>
            <div class="data-menu" id="data-menu">
                <div class="dm-set">
                    <label>Set:</label>
                    <input type="text" id="dm-set-code" value="">
                </div>
                <button onclick="refresh17lands()">📊 Refresh 17Lands Ratings</button>
                <div class="dm-status">✓ Data cached</div>
            </div>
        </div>
    </div>
    <div class="persistence-btns" id="mgmt-btns">
        <button onclick="openArchManager()">Archetypes</button>
        <button onclick="openTierManager()">Tiers</button>
    </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="tab-content active" id="guide-tab">
    <!-- Draft guide rendered here -->
</div>

<div class="tab-content" id="browser-tab">
    <div class="browser-layout">
        <div class="browser-col">
            <h3>Archetypes</h3>
            <div id="arch-list-browser"></div>
        </div>
        <div class="browser-col">
            <h3>All Cards</h3>
            <div class="browser-sort" id="sort-btns"></div>
            <div id="card-grid-browser"></div>
        </div>
    </div>
</div>

</div>

<!-- Edit panel -->
<div id="edit-panel">
    <h2>Edit Card</h2>
    <div class="ep-section">
        <label>Card Name</label>
        <input type="text" id="edit-name" readonly>
    </div>
    <div class="ep-grid">
        <div>
            <label>Tier</label>
            <select id="edit-tier"></select>
        </div>
        <div>
            <label>Removal Type</label>
            <select id="edit-removal-type">
                <option value="">None</option>
                <option value="creature">Creature</option>
                <option value="instant">Instant/Sorcery</option>
                <option value="enchantment">Enchantment</option>
                <option value="other">Other</option>
            </select>
        </div>
    </div>
    <div class="ep-section ep-full">
        <label>Comment</label>
        <textarea id="edit-comment"></textarea>
    </div>
    <div class="ep-section ep-full">
        <label>Archetypes (check all that apply)</label>
        <div class="ep-checkbox-group" id="edit-archs"></div>
    </div>
    <div class="ep-section ep-full">
        <label>Tags</label>
        <div class="ep-section">
            <label>Roles (comma-sep)</label>
            <input type="text" id="edit-roles">
        </div>
        <div class="ep-section">
            <label>Types (comma-sep)</label>
            <input type="text" id="edit-types">
        </div>
        <div class="ep-section">
            <label>Speed (comma-sep)</label>
            <input type="text" id="edit-speed">
        </div>
    </div>
    <div id="preview">
        <div id="preview-draft"></div>
        <div id="preview-browser"></div>
    </div>
    <div class="btn-group">
        <button class="btn-save" onclick="saveEdit()">Save</button>
        <button class="btn-close" onclick="closeEditPanel()">Close</button>
    </div>
</div>

<!-- Mobile detail panel -->
<div id="mobile-detail">
    <button class="md-close" onclick="closeMobileDetail()">✕</button>
    <div class="md-header"></div>
    <div style="padding:12px;"></div>
</div>

<!-- Archetype Manager Modal -->
<div class="mgmt-modal" id="arch-manager">
    <div class="mgmt-panel" style="position:relative;">
        <button class="mgmt-close" onclick="closeArchManager()">✕</button>
        <h3>⚙️ Manage Archetypes</h3>
        <div id="arch-list"></div>
        <button class="mgmt-add-btn" onclick="addNewArchetype()">+ Add Archetype</button>
        <br>
        <button class="mgmt-save-btn" onclick="saveArchetypes()">Save Changes</button>

<!-- Tier Manager Modal -->
<div class="mgmt-modal" id="tier-manager">
    <div class="mgmt-panel" style="position:relative;">
        <button class="mgmt-close" onclick="closeTierManager()">✕</button>
        <h3>📊 Manage Tiers</h3>
        <div id="tier-list"></div>
        <div style="display:flex;gap:4px;margin-top:8px;">
            <input type="text" id="new-tier-input" placeholder="New tier (e.g. S)" style="padding:4px 8px;font-size:12px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;width:100px;">
            <button class="mgmt-add-btn" onclick="addNewTier()" style="margin:0;">+ Add</button>
        </div>
        <br>
        <button class="mgmt-save-btn" onclick="saveTiers()">Save Changes</button>
    </div>
</div>

<script>
// ── Global state ──
let CURRENT_SET = 'TMT';
let CARD_DATA = {}, CARD_CONFIG = {};
let DEFAULT_CONFIG = {}, DEFAULT_ARCHETYPES = [], DEFAULT_TIERS = [];
let DB = {};
let ARCHETYPES = [];
let TIER_RANK = {};
let GRADE_COLORS = {};

let currentSearchIdx = 0;
let editMode = false;
let editingCard = null;

// ── Tier and Grade helpers ──
function buildTierRank(tiers) {
    TIER_RANK = {};
    tiers.forEach((t, i) => TIER_RANK[t] = i);
}

function buildGradeColors(tiers) {
    const palette = ['#ff4757','#ee5a24','#f39c12','#f1c40f','#2ecc71','#1abc9c','#3498db','#95a5a6','#7f8c8d','#636e72','#4a4a4a','#3d3d3d','#2d3436'];
    GRADE_COLORS = {};
    tiers.forEach((t, i) => {
        GRADE_COLORS[t] = palette[Math.min(i, palette.length - 1)] || '#2d3436';
    });
}

// ── Load Data ──
async function loadData(setCode) {
    if (!setCode) setCode = 'TMT';
    CURRENT_SET = setCode.toUpperCase();
    
    document.getElementById('loading-overlay').style.display = 'flex';
    document.getElementById('loading-overlay').innerHTML = '<div class="spinner"></div><div style="color:#8b949e">Loading ' + CURRENT_SET + '...</div>';
    
    const dmSetCode = document.getElementById('dm-set-code');
    if (dmSetCode) dmSetCode.value = CURRENT_SET;
    
    try {
        const [dataResp, configResp] = await Promise.all([
            fetch(`card_data_${CURRENT_SET}.json`),
            fetch(`card_config_${CURRENT_SET}.json`)
        ]);
        
        if (!dataResp.ok || !configResp.ok) {
            throw new Error(`Could not load ${CURRENT_SET} data files. Make sure card_data_${CURRENT_SET}.json and card_config_${CURRENT_SET}.json exist.`);
        }
        
        CARD_DATA = await dataResp.json();
        CARD_CONFIG = await configResp.json();
        
        const configArchetypes = CARD_CONFIG._archetypes || [];
        const configTiers = CARD_CONFIG._tiers || ['A+','A','A-','B+','B','B-','C+','C','C-','D+','D','D-','F'];
        
        ARCHETYPES = configArchetypes;
        buildTierRank(configTiers);
        buildGradeColors(configTiers);
        
        DEFAULT_ARCHETYPES = JSON.parse(JSON.stringify(configArchetypes));
        DEFAULT_TIERS = [...configTiers];
        
        DEFAULT_CONFIG = {};
        for (const name of new Set([...Object.keys(CARD_DATA), ...Object.keys(CARD_CONFIG)])) {
            if (name.startsWith('_')) continue;
            const data = CARD_DATA[name] || {};
            const config = CARD_CONFIG[name] || { tier: null, sections: [], archetypes: {}, tags: { roles: [], types: [], speed: [] }, removal_type: null, comment: '' };
            DEFAULT_CONFIG[name] = { ...data, ...config };
        }
        
        let knownSets = JSON.parse(localStorage.getItem('draft_known_sets') || '[]');
        if (!knownSets.includes(CURRENT_SET)) {
            knownSets.push(CURRENT_SET);
            localStorage.setItem('draft_known_sets', JSON.stringify(knownSets));
        }
        
        localStorage.setItem('draft_last_set', CURRENT_SET);
        updateSetSelector();
        
        loadConfig();
        updateStatsBar();
        renderAll();
        document.getElementById('loading-overlay').style.display = 'none';
    } catch (err) {
        document.getElementById('loading-overlay').innerHTML =
            `<div style="color:#f85149;font-size:16px;text-align:center;padding:20px;">
            ⚠️ ${err.message}<br><br>
            <button onclick="loadData('TMT')" style="padding:8px 16px;background:#21262d;color:#58a6ff;border:1px solid #30363d;border-radius:6px;cursor:pointer;">Try loading TMT</button>
            </div>`;
    }
}

// ── Set switching ──
function switchSet(setCode) {
    if (setCode === '__add__') {
        const code = prompt('Enter set code (e.g. DSK, BLB, TMT):');
        if (!code) { updateSetSelector(); return; }
        loadData(code.trim().toUpperCase());
        return;
    }
    loadData(setCode);
}

function updateSetSelector() {
    const sel = document.getElementById('set-selector');
    if (!sel) return;
    const knownSets = JSON.parse(localStorage.getItem('draft_known_sets') || '["TMT"]');
    sel.innerHTML = knownSets.map(s => 
        `<option value="${s}" ${s === CURRENT_SET ? 'selected' : ''}>${s}</option>`
    ).join('') + '<option value="__add__">+ Add Set...</option>';
}

// ── Config persistence ──
function saveConfig() {
    const toSave = { _archetypes: ARCHETYPES, _tiers: Object.keys(TIER_RANK).sort((a,b) => TIER_RANK[a] - TIER_RANK[b]) };
    for (const [name, c] of Object.entries(DB)) {
        toSave[name] = { tier: c.tier, sections: c.sections, archetypes: c.archetypes, tags: c.tags, removal_type: c.removal_type, comment: c.comment };
    }
    localStorage.setItem(`draft_config_${CURRENT_SET}_v2`, JSON.stringify(toSave));
}

function loadConfig() {
    const saved = JSON.parse(localStorage.getItem(`draft_config_${CURRENT_SET}_v2`) || 'null');
    if (saved) {
        if (saved._archetypes) {
            ARCHETYPES = saved._archetypes;
        }
        if (saved._tiers) {
            buildTierRank(saved._tiers);
            buildGradeColors(saved._tiers);
        }
    }
    
    DB = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    if (saved) {
        for (const [name, sc] of Object.entries(saved)) {
            if (name.startsWith('_')) continue;
            if (DB[name]) Object.assign(DB[name], sc);
        }
        for (const name of Object.keys(DEFAULT_CONFIG)) {
            if (!saved[name]) {
                DB[name] = JSON.parse(JSON.stringify(DEFAULT_CONFIG[name]));
            }
        }
    }
}

// ── Export/Import ──
function exportConfig() {
    const data = { _set: CURRENT_SET, _archetypes: ARCHETYPES, _tiers: Object.keys(TIER_RANK).sort((a,b) => TIER_RANK[a] - TIER_RANK[b]) };
    for (const [name, c] of Object.entries(DB)) {
        data[name] = { tier: c.tier, sections: c.sections, archetypes: c.archetypes, tags: c.tags, removal_type: c.removal_type, comment: c.comment };
    }
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `draft-guide-${CURRENT_SET.toLowerCase()}.json`;
    a.click();
}

function importConfig(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
        try {
            const imported = JSON.parse(event.target.result);
            if (imported._archetypes) { ARCHETYPES = imported._archetypes; }
            if (imported._tiers) { buildTierRank(imported._tiers); buildGradeColors(imported._tiers); }
            DB = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
            for (const [name, sc] of Object.entries(imported)) {
                if (name.startsWith('_')) continue;
                if (DB[name]) Object.assign(DB[name], sc);
            }
            saveConfig();
            renderAll();
            alert('Imported successfully!');
        } catch (err) {
            alert('Import error: ' + err.message);
        }
    };
    reader.readAsText(file);
    e.target.value = '';
}

function resetConfig() {
    if (!confirm('Reset all changes to defaults?')) return;
    ARCHETYPES = JSON.parse(JSON.stringify(DEFAULT_ARCHETYPES));
    buildTierRank([...DEFAULT_TIERS]);
    buildGradeColors([...DEFAULT_TIERS]);
    localStorage.removeItem(`draft_config_${CURRENT_SET}_v2`);
    DB = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    renderAll();
    updateStatsBar();
}

// ── Tips persistence ──
function saveTip(id, title, content) {
    let tips = JSON.parse(localStorage.getItem(`draft_tips_${CURRENT_SET}_v1`) || '{}');
    tips[id] = { title, content };
    localStorage.setItem(`draft_tips_${CURRENT_SET}_v1`, JSON.stringify(tips));
}

function loadTips() {
    return JSON.parse(localStorage.getItem(`draft_tips_${CURRENT_SET}_v1`) || '{}');
}

// ── Tab switching ──
function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + '-tab').classList.add('active');
    event.target.classList.add('active');
    if (tab === 'browser') renderBrowser();
}

// ── Edit mode ──
function toggleEditMode() {
    editMode = !editMode;
    const btn = document.getElementById('edit-mode-btn');
    const mgmtBtns = document.getElementById('mgmt-btns');
    if (editMode) {
        btn.classList.add('active');
        if (mgmtBtns) mgmtBtns.style.display = 'flex';
    } else {
        btn.classList.remove('active');
        if (mgmtBtns) mgmtBtns.style.display = 'none';
        closeEditPanel();
    }
    renderAll();
}

// ── Edit panel functions ──
function openEditPanel(cardName) {
    const c = DB[cardName];
    if (!c) return;
    editingCard = cardName;
    
    document.getElementById('edit-name').value = cardName;
    document.getElementById('edit-comment').value = c.comment || '';
    document.getElementById('edit-removal-type').value = c.removal_type || '';
    
    const tierSelect = document.getElementById('edit-tier');
    const tiers = Object.keys(TIER_RANK).sort((a,b) => TIER_RANK[a] - TIER_RANK[b]);
    tierSelect.innerHTML = '<option value="">None</option>' + tiers.map(t => `<option value="${t}" ${c.tier===t?'selected':''}>${t}</option>`).join('');
    
    const rolesStr = (c.tags?.roles || []).join(', ');
    const typesStr = (c.tags?.types || []).join(', ');
    const speedStr = (c.tags?.speed || []).join(', ');
    document.getElementById('edit-roles').value = rolesStr;
    document.getElementById('edit-types').value = typesStr;
    document.getElementById('edit-speed').value = speedStr;
    
    const archContainer = document.getElementById('edit-archs');
    archContainer.innerHTML = ARCHETYPES.map(a => `
        <label><input type="checkbox" value="${a.id}" ${c.archetypes?.[a.id]?'checked':''}> ${a.name}</label>
    `).join('');
    
    document.getElementById('edit-panel').classList.add('open');
}

function closeEditPanel() {
    document.getElementById('edit-panel').classList.remove('open');
    editingCard = null;
}

function saveEdit() {
    if (!editingCard) return;
    const c = DB[editingCard];
    c.tier = document.getElementById('edit-tier').value || null;
    c.comment = document.getElementById('edit-comment').value;
    c.removal_type = document.getElementById('edit-removal-type').value || null;
    
    c.tags = c.tags || { roles: [], types: [], speed: [] };
    c.tags.roles = document.getElementById('edit-roles').value.split(',').map(s => s.trim()).filter(Boolean);
    c.tags.types = document.getElementById('edit-types').value.split(',').map(s => s.trim()).filter(Boolean);
    c.tags.speed = document.getElementById('edit-speed').value.split(',').map(s => s.trim()).filter(Boolean);
    
    c.archetypes = {};
    document.querySelectorAll('#edit-archs input').forEach(cb => {
        c.archetypes[cb.value] = cb.checked;
    });
    
    saveConfig();
    closeEditPanel();
    renderAll();
}

// ── Mobile detail panel ──
function showMobileDetail(cardName) {
    const c = DB[cardName];
    if (!c) return;
    const panel = document.getElementById('mobile-detail');
    const header = panel.querySelector('.md-header');
    header.innerHTML = `
        <img src="${c.image_uris?.normal || ''}" alt="">
        <div class="md-info">
            <div class="md-name">${cardName}</div>
            <div class="md-type">${c.type_line || ''}</div>
            <div class="md-stats">
                <div><span class="ms-label">P/T</span><span class="ms-val">${c.power}/${c.toughness}</span></div>
                <div><span class="ms-label">Rarity</span><span class="ms-val">${c.rarity?.toUpperCase() || '-'}</span></div>
                <div><span class="ms-label">Tier</span><span class="ms-val">${c.tier || '-'}</span></div>
            </div>
        </div>
    `;
    const content = panel.querySelector('[style*="padding:12px"]');
    let html = '';
    if (c.oracle_text) {
        html += `<div style="padding:8px 12px;font-size:12px;color:#c9d1d9;">${c.oracle_text.replace(/\n/g, '<br>')}</div>`;
    }
    if ((c.tags?.roles || []).length) {
        html += `<div class="md-tags"><strong>Roles:</strong> ${c.tags.roles.map(r => `<span>${r}</span>`).join('')}</div>`;
    }
    if (c.comment) {
        html += `<div class="md-comment">${c.comment}</div>`;
    }
    content.innerHTML = html;
    panel.classList.add('show');
}

function closeMobileDetail() {
    document.getElementById('mobile-detail').classList.remove('show');
}

// ── Card rendering helpers ──
function renderCardTile(cardName) {
    const c = DB[cardName];
    const img = c.image_uris?.normal || '';
    const gradeColor = c.tier && GRADE_COLORS[c.tier] ? GRADE_COLORS[c.tier] : '#95a5a6';
    const gradeText = c.tier || '';
    const rarity = c.rarity ? c.rarity.charAt(0).toUpperCase() : '';
    const rarityClass = `rar-${c.rarity?.charAt(0).toLowerCase() || 'c'}`;
    
    let html = `<div class="card-tile ${editMode ? 'editing' : ''}" onclick="${editMode ? `openEditPanel('${cardName.replace(/'/g, "\\'")}')` : `showMobileDetail('${cardName.replace(/'/g, "\\'")}')` }">`;
    
    if (img) {
        html += `<img src="${img}" alt="${cardName}" loading="lazy">`;
    } else {
        html += `<div class="card-noimg">${cardName}</div>`;
    }
    
    if (gradeText) {
        html += `<div class="grade" style="background-color:${gradeColor};">${gradeText}</div>`;
    }
    
    html += `<div class="card-stats"><span class="${rarityClass}">${rarity}</span></div>`;
    
    if (c.comment) {
        html += `<div class="card-comment">${c.comment}</div>`;
    }
    
    html += `</div>`;
    return html;
}

// ── Stats bar ──
function updateStatsBar() {
    const tiers = Object.keys(TIER_RANK).sort((a,b) => TIER_RANK[a] - TIER_RANK[b]);
    const stats = {};
    for (const t of tiers) stats[t] = 0;
    
    for (const c of Object.values(DB)) {
        if (c.tier && tiers.includes(c.tier)) stats[c.tier]++;
    }
    
    const bar = document.getElementById('stats-bar');
    let html = '';
    for (const t of tiers) {
        if (stats[t] === 0) continue;
        const color = GRADE_COLORS[t] || '#999';
        html += `<span style="background-color:${color};color:#fff;"><strong>${t}</strong> ${stats[t]}</span>`;
    }
    
    bar.innerHTML = html;
}

// ── Search ──
function searchNext() {
    const query = document.getElementById('card-search').value.toLowerCase();
    if (!query) return;
    
    const tiles = Array.from(document.querySelectorAll('.card-tile'));
    let nextIdx = currentSearchIdx;
    
    for (let i = 0; i < tiles.length; i++) {
        const idx = (currentSearchIdx + 1 + i) % tiles.length;
        const cardName = tiles[idx].getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
        if (cardName && cardName.toLowerCase().includes(query)) {
            tiles[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
            tiles[idx].style.outline = '3px solid #f0883e';
            setTimeout(() => tiles[idx].style.outline = '', 2000);
            currentSearchIdx = idx;
            document.getElementById('search-count').textContent = `${idx + 1}/${tiles.length}`;
            return;
        }
    }
    
    document.getElementById('search-count').textContent = '0/' + tiles.length;
}

// ── Data refresh menu ──
function toggleDataMenu(e) {
    const menu = document.getElementById('data-menu');
    menu.classList.toggle('show');
    e.stopPropagation();
}

async function refresh17lands() {
    const setCode = document.getElementById('dm-set-code').value.toUpperCase();
    if (!setCode) return;
    
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '⟳ Loading...';
    
    try {
        const resp = await fetch(`https://www.17lands.com/api/set_names`);
        const sets = await resp.json();
        alert('Refresh complete (mock)');
    } catch (err) {
        alert('Error: ' + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '📊 Refresh 17Lands Ratings';
    }
}

// ── Archetype Manager ──
function openArchManager() {
    const container = document.getElementById('arch-list');
    container.innerHTML = ARCHETYPES.map((a, i) => `
        <div class="mgmt-item" data-arch-idx="${i}">
            <div class="mi-header">
                <span class="mi-name">${a.icon || ''} ${a.name}</span>
                <span class="mi-actions">
                    <button onclick="this.closest('.mgmt-item').querySelector('.mi-details').style.display=this.closest('.mgmt-item').querySelector('.mi-details').style.display==='none'?'block':'none'">Edit</button>
                    <button class="mi-delete" onclick="removeArchetype(${i})">Delete</button>
                </span>
            </div>
            <div class="mi-details" style="display:none;">
                <div class="mgmt-field"><label>ID</label><input value="${a.id}" data-field="id"></div>
                <div class="mgmt-field"><label>Name</label><input value="${a.name}" data-field="name"></div>
                <div class="mgmt-field"><label>Colors (comma-sep)</label><input value="${(a.colors||[]).join(',')}" data-field="colors"></div>
                <div class="mgmt-field"><label>Color Hex</label><input value="${a.color_hex||''}" data-field="color_hex"></div>
                <div class="mgmt-field"><label>Icon</label><input value="${a.icon||''}" data-field="icon"></div>
                <div class="mgmt-field"><label>Short Description</label><textarea data-field="short">${a.short||''}</textarea></div>
                <div class="mgmt-field"><label>Strategy</label><textarea data-field="strategy">${a.strategy||''}</textarea></div>
                <div class="mgmt-field"><label>Signposts (comma-sep)</label><input value="${(a.signposts||[]).join(', ')}" data-field="signposts"></div>
                <div class="mgmt-field"><label>Payoffs (comma-sep)</label><input value="${(a.payoffs||[]).join(', ')}" data-field="payoffs"></div>
                <div class="mgmt-field"><label>Enablers (comma-sep)</label><input value="${(a.enablers||[]).join(', ')}" data-field="enablers"></div>
                <div class="mgmt-field"><label>Removal (comma-sep)</label><input value="${(a.removal||[]).join(', ')}" data-field="removal"></div>
                <div class="mgmt-field"><label>Role Players (comma-sep)</label><input value="${(a.role_players||[]).join(', ')}" data-field="role_players"></div>
            </div>
        </div>
    `).join('');
    document.getElementById('arch-manager').classList.add('show');
}

function closeArchManager() { 
    document.getElementById('arch-manager').classList.remove('show'); 
}

function addNewArchetype() {
    const id = prompt('Archetype ID (e.g. ub_control):');
    if (!id) return;
    ARCHETYPES.push({
        id: id.toLowerCase().replace(/\s+/g,'_'), name: id.toUpperCase(), colors: [], color_hex: '#95a5a6', icon: '🎴',
        short: '', strategy: '', signposts: [], payoffs: [], enablers: [], removal: [], role_players: [], key_synergies: []
    });
    openArchManager();
}

function removeArchetype(idx) {
    if (!confirm(`Delete archetype "${ARCHETYPES[idx]?.name}"?`)) return;
    ARCHETYPES.splice(idx, 1);
    openArchManager();
}

function saveArchetypes() {
    document.querySelectorAll('#arch-list .mgmt-item').forEach((item, i) => {
        if (!ARCHETYPES[i]) return;
        item.querySelectorAll('[data-field]').forEach(el => {
            const field = el.dataset.field;
            let val = el.value;
            if (['colors','signposts','payoffs','enablers','removal','role_players'].includes(field)) {
                val = val.split(',').map(s => s.trim()).filter(Boolean);
            }
            ARCHETYPES[i][field] = val;
        });
    });
    saveConfig();
    renderAll();
    closeArchManager();
}

// ── Tier Manager ──
function openTierManager() {
    const tiers = Object.keys(TIER_RANK).sort((a,b) => TIER_RANK[a] - TIER_RANK[b]);
    const container = document.getElementById('tier-list');
    container.innerHTML = tiers.map((t, i) => `
        <div class="mgmt-item" style="display:flex;align-items:center;gap:8px;padding:6px 10px;">
            <span style="color:${GRADE_COLORS[t]||'#999'};font-weight:bold;min-width:30px;">${t}</span>
            <button onclick="moveTier(${i},-1)" style="padding:2px 6px;background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:3px;cursor:pointer;" ${i===0?'disabled':''}>↑</button>
            <button onclick="moveTier(${i},1)" style="padding:2px 6px;background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:3px;cursor:pointer;" ${i===tiers.length-1?'disabled':''}>↓</button>
            <button onclick="removeTier('${t}')" style="padding:2px 6px;background:#21262d;color:#f85149;border:1px solid #f85149;border-radius:3px;cursor:pointer;margin-left:auto;">✕</button>
        </div>
    `).join('');
    document.getElementById('tier-manager').classList.add('show');
}

function closeTierManager() { 
    document.getElementById('tier-manager').classList.remove('show'); 
}

function moveTier(idx, dir) {
    const tiers = Object.keys(TIER_RANK).sort((a,b) => TIER_RANK[a] - TIER_RANK[b]);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= tiers.length) return;
    [tiers[idx], tiers[newIdx]] = [tiers[newIdx], tiers[idx]];
    buildTierRank(tiers);
    buildGradeColors(tiers);
    openTierManager();
}

function addNewTier() {
    const input = document.getElementById('new-tier-input');
    const tier = input.value.trim();
    if (!tier) return;
    const tiers = Object.keys(TIER_RANK).sort((a,b) => TIER_RANK[a] - TIER_RANK[b]);
    if (tiers.includes(tier)) { alert('Tier already exists'); return; }
    tiers.push(tier);
    buildTierRank(tiers);
    buildGradeColors(tiers);
    input.value = '';
    openTierManager();
}

function removeTier(tier) {
    const cardsUsing = Object.values(DB).filter(c => c.tier === tier).length;
    if (cardsUsing > 0 && !confirm(`${cardsUsing} cards use tier "${tier}". Remove anyway?`)) return;
    const tiers = Object.keys(TIER_RANK).sort((a,b) => TIER_RANK[a] - TIER_RANK[b]).filter(t => t !== tier);
    buildTierRank(tiers);
    buildGradeColors(tiers);
    openTierManager();
}

function saveTiers() {
    saveConfig();
    renderAll();
    closeTierManager();
}

// ── Browser ──
function renderBrowser() {
    const archContainer = document.getElementById('arch-list-browser');
    archContainer.innerHTML = ARCHETYPES.map(a => `
        <div class="arch-card" onclick="filterByArch('${a.id}')">
            <div class="arch-title">${a.icon || ''} ${a.name}</div>
            <div class="arch-colors">
                ${(a.colors || []).slice(0, 5).map(color => {
                    const colorMap = { W: '#f0e68c', U: '#add8e6', B: '#2f4f4f', R: '#ff6347', G: '#228b22' };
                    return `<div class="arch-color" style="background-color: ${colorMap[color] || '#999'};"></div>`;
                }).join('')}
            </div>
            <div class="arch-desc">${a.short || ''}</div>
        </div>
    `).join('');
    
    const tiers = Object.keys(TIER_RANK).sort((a,b) => TIER_RANK[a] - TIER_RANK[b]);
    const sortBtns = document.getElementById('sort-btns');
    sortBtns.innerHTML = tiers.map(t => `<button class="active" onclick="filterByTier('${t}')">${t}</button>`).join('');
    
    const cardGrid = document.getElementById('card-grid-browser');
    const cards = Object.keys(DB);
    cardGrid.innerHTML = cards.map(name => renderCardTile(name)).join('');
}

function filterByArch(archId) {
    const cardGrid = document.getElementById('card-grid-browser');
    const cards = Object.entries(DB).filter(([_, c]) => c.archetypes?.[archId]).map(([name]) => name);
    cardGrid.innerHTML = cards.length ? cards.map(name => renderCardTile(name)).join('') : '<div style="padding:12px;color:#8b949e;">No cards in this archetype.</div>';
}

function filterByTier(tier) {
    const cardGrid = document.getElementById('card-grid-browser');
    const cards = Object.entries(DB).filter(([_, c]) => c.tier === tier).map(([name]) => name);
    cardGrid.innerHTML = cards.length ? cards.map(name => renderCardTile(name)).join('') : '<div style="padding:12px;color:#8b949e;">No cards in this tier.</div>';
}

// ── Main render functions (placeholder) ──
function renderGuide() {
    // Render the draft guide using sections from DB
    // This is simplified - you'd expand this based on CARD_CONFIG._sections
    const container = document.getElementById('guide-tab');
    const tiers = Object.keys(TIER_RANK).sort((a,b) => TIER_RANK[a] - TIER_RANK[b]);
    
    let html = '';
    for (const tier of tiers) {
        const cards = Object.entries(DB).filter(([_, c]) => c.tier === tier).map(([name]) => name);
        if (cards.length === 0) continue;
        
        const tierColor = GRADE_COLORS[tier] || '#999';
        html += `<h2 style="border-color:${tierColor}">Tier ${tier} (${cards.length} cards)</h2>`;
        html += '<div class="card-row">' + cards.map(name => renderCardTile(name)).join('') + '</div>';
    }
    
    container.innerHTML = html;
}

function renderAll() {
    renderGuide();
    updateStatsBar();
}

// ── Initialization ──
const urlSet = new URLSearchParams(window.location.search).get('set');
const lastSet = localStorage.getItem('draft_last_set');
loadData(urlSet || lastSet || 'TMT');
</script>
